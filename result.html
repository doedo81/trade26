<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>⚙️ 투자 레이스 관리자 패널</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #0f172a; color: white; font-family: sans-serif; }
        .side { width: 320px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .card { background: #334155; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h2 { color: #38bdf8; margin-top: 0; }
        label { font-size: 0.9em; color: #94a3b8; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-copy { background: #38bdf8; color: #0f172a; }
        .btn-refresh { background: #22c55e; color: white; }
        /* QR 코드 스타일 */
        #qrcode { background: white; padding: 10px; margin-top: 15px; display: flex; justify-content: center; border-radius: 8px; }
        canvas { margin-top: 20px; flex: 1; }
    </style>
</head>
<body>
    <div class="side">
        <h2>⚙️ 설정 패널</h2>
        <div class="card">
            <label>📅 현재 라운드</label>
            <select id="roundSet" onchange="updateAll()">
                <option value="1">1 라운드</option><option value="2">2 라운드</option>
                <option value="3">3 라운드</option><option value="4">4 라운드</option>
            </select>
            <label>💰 투자 한도 (원)</label>
            <input type="number" id="limitSet" value="100000000" step="10000000" oninput="updateAll()">
            
            <button class="btn-copy" onclick="copyLink()">🔗 학생용 링크 복사</button>
            
            <div id="qrcode"></div>
            <p style="font-size: 0.7em; text-align: center; color: #94a3b8; margin-top: 5px;">화면의 QR을 찍고 접속하세요!</p>
        </div>
        
        <div class="card">
            <button class="btn-refresh" onclick="loadData()">🔄 실시간 집계 새로고침</button>
            <button onclick="setMode('total')" style="background:#fbbf24; color:#0f172a;">🏆 최종 통합 순위</button>
        </div>
    </div>

    <div class="main">
        <h1 id="viewTitle">📊 라운드 결과 발표</h1>
        <canvas id="chart"></canvas>
    </div>

    <script>
        // ★ 선생님 시트 주소 (반드시 본인 것으로 수정!)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1U6YtLPRPv2vI8hyceTnt2mL7bqCHRXMLx1RlZD12gTc/export?format=csv";
        let myChart;
        let qrGenerator;
        let currentMode = '1';

        // 링크 업데이트 및 QR 코드 생성
        function updateAll() {
            const r = document.getElementById('roundSet').value;
            const l = document.getElementById('limitSet').value;
            // ★ 본인 깃허브 주소로 수정 (doedo81 부분)
            const studentUrl = `https://doedo81.github.io/trade26/index.html?round=${r}&limit=${l}`;
            
            // QR 코드 갱신
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = ""; // 기존 QR 삭제
            qrGenerator = new QRCode(qrDiv, {
                text: studentUrl,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
            
            window.lastStudentUrl = studentUrl;
            currentMode = r;
            document.getElementById('viewTitle').innerText = `📊 ${r}라운드 투자 유치 현황`;
        }

        function copyLink() {
            navigator.clipboard.writeText(window.lastStudentUrl);
            alert("학생용 주소가 복사되었습니다!");
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('viewTitle').innerText = m === 'total' ? "🏆 전체 라운드 통합 순위" : `📊 ${m}라운드 투자 유치 현황`;
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(SHEET_URL + "&t=" + new Date().getTime());
                const text = await res.text();
                const rows = Papa.parse(text, {header:true, skipEmptyLines:true}).data;
                
                let totals = {"1모둠":0,"2모둠":0,"3모둠":0,"4모둠":0,"5모둠":0,"6모둠":0};
                rows.forEach(row => {
                    if(currentMode !== 'total' && row.라운드 !== currentMode) return;
                    try {
                        const inv = JSON.parse(row.상세내역.replace(/""/g, '"'));
                        for(let t in inv) if(totals.hasOwnProperty(t)) totals[t] += Number(inv[t]);
                    } catch(e){}
                });
                draw(totals);
            } catch(e) { alert("데이터 로드 실패!"); }
        }

        function draw(data) {
            const ctx = document.getElementById('chart').getContext('2d');
            const sorted = Object.keys(data).sort((a,b) => data[b] - data[a]);
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted,
                    datasets: [{ label: '유치 금액', data: sorted.map(k=>data[k]), backgroundColor: '#38bdf8' }]
                },
                options: { 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: 'white', font: {size:16} } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = () => { updateAll(); loadData(); };
    </script>
</body>
</html>
