<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🏆 투자 결과 발표 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(241, 196, 15, 0.5); }
        .btn-refresh { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 1.2em; margin-bottom: 20px; transition: 0.3s; }
        #status { margin-bottom: 10px; color: #888; font-size: 1em; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 실시간 투자 순위 발표</h1>
        <div id="status">데이터 연결 중...</div>
        <button class="btn-refresh" onclick="loadData()">🔄 데이터 업데이트 & 정산</button>
        <canvas id="rankingChart"></canvas>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1U6YtLPRPv2vI8hyceTnt2mL7bqCHRXMLx1RlZD12gTc/export?format=csv";

        let myChart;

        async function loadData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "⏳ 데이터를 분석 중...";

            try {
                const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
                const csvText = await response.text();
                const results = Papa.parse(csvText, { header: false, skipEmptyLines: true }).data;
                const rows = results.slice(1);

                if (rows.length === 0) {
                    statusDiv.innerText = "⚠️ 시트에 데이터가 없습니다! 먼저 투자를 진행해 주세요.";
                    return;
                }

                let latestEntries = {};
                rows.forEach(row => {
                    if(row.length < 4) return;
                    const teamName = row[1].trim(); 
                    try {
                        // 구글 시트 특유의 따옴표 꼬임 방지 처리
                        let cleanJson = row[3].replace(/^"|"$/g, '').replace(/""/g, '"');
                        latestEntries[teamName] = JSON.parse(cleanJson);
                    } catch(e) { console.log("파싱 건너뜀:", teamName); }
                });

                // 수익률 설정
                const rates = { "1모둠": 1.1, "2모둠": 1.2, "3모둠": 0.8, "4모둠": 1.3, "5모둠": 0.9, "6모둠": 1.0 };

                let finalBalances = { "1모둠": 0, "2모둠": 0, "3모둠": 0, "4모둠": 0, "5모둠": 0, "6모둠": 0 };
                
                let foundAny = false;
                Object.keys(latestEntries).forEach(investor => {
                    let total = 0;
                    const investments = latestEntries[investor];
                    for (let targetTeam in investments) {
                        total += Number(investments[targetTeam] || 0) * (rates[targetTeam] || 1);
                        foundAny = true;
                    }
                    if (finalBalances.hasOwnProperty(investor)) {
                        finalBalances[investor] = Math.floor(total);
                    }
                });

                if (!foundAny) {
                    statusDiv.innerText = "⚠️ 데이터는 있지만 유효한 투자 내역이 없습니다.";
                } else {
                    updateChart(finalBalances);
                    statusDiv.innerText = "✅ 정산 완료! (" + Object.keys(latestEntries).length + "개 모둠 응답)";
                }

            } catch (error) {
                statusDiv.innerText = "❌ 에러: 구글 시트 주소가 정확한지 확인하세요.";
            }
        }

        function updateChart(balances) {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            const sortedLabels = Object.keys(balances).sort((a, b) => balances[b] - balances[a]);
            const sortedValues = sortedLabels.map(l => balances[l]);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedLabels,
                    datasets: [{
                        label: '최종 자산',
                        data: sortedValues,
                        backgroundColor: ['#f1c40f', '#bdc3c7', '#e67e22', '#3498db', '#9b59b6', '#2ecc71'],
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, ticks: { color: 'white' } },
                        x: { ticks: { color: 'white', font: { size: 16, weight: 'bold' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
