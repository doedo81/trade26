<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🏆 투자 유치 왕 발표</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #1e293b; padding: 40px; border-radius: 25px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; font-size: 3.5em; margin-bottom: 5px; }
        #status { margin-bottom: 20px; color: #fbbf24; font-size: 1.2em; font-weight: bold; }
        .btn-refresh { background: #38bdf8; color: #0f172a; border: none; padding: 18px 50px; border-radius: 15px; cursor: pointer; font-size: 1.5em; font-weight: bold; transition: 0.3s; margin-bottom: 30px; }
        .btn-refresh:hover { background: #7dd3fc; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 투자 유치 실시간 순위</h1>
        <div id="status">연결 대기 중...</div>
        <button class="btn-refresh" onclick="loadData()">📊 결과 집계 업데이트</button>
        <canvas id="rankingChart"></canvas>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1U6YtLPRPv2vI8hyceTnt2mL7bqCHRXMLx1RlZD12gTc/export?format=csv";

        let myChart;

        async function loadData() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
                const csvText = await response.text();
                const results = Papa.parse(csvText, { header: false, skipEmptyLines: true }).data;
                const rows = results.slice(1);

                // 집계통 (모든 모둠 0원 세팅)
                let totals = { "1모둠": 0, "2모둠": 0, "3모둠": 0, "4모둠": 0, "5모둠": 0, "6모둠": 0 };

                rows.forEach(row => {
                    if(row.length < 4) return;
                    try {
                        let cleanJson = row[3].replace(/^"|"$/g, '').replace(/""/g, '"');
                        let investments = JSON.parse(cleanJson);
                        for (let target in investments) {
                            if (totals.hasOwnProperty(target)) {
                                totals[target] += Number(investments[target]);
                            }
                        }
                    } catch(e) {}
                });

                updateChart(totals);
                statusDiv.innerText = "✅ 총 " + rows.length + "건의 투자가 집계되었습니다!";
            } catch (error) {
                statusDiv.innerText = "❌ 시트 연결 실패. 주소를 확인하세요.";
            }
        }

        function updateChart(data) {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            const sorted = Object.keys(data).sort((a, b) => data[b] - data[a]);
            const values = sorted.map(k => data[k]);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#fbbf24', '#94a3b8', '#d97706', '#0284c7', '#7c3aed', '#059669'],
                        borderRadius: 10
                    }]
                },
                options: {
                    plugins: { 
                        legend: { display: false },
                        // 막대 위에 금액 표시
                        tooltip: { enabled: true }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: 'white', font: { size: 20, weight: 'bold' } } }
                    }
                }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
