<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🏆 투자 결과 발표 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: 'Pretendard', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(241, 196, 15, 0.5); }
        canvas { margin-top: 20px; }
        .btn-refresh { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 1.2em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 실시간 투자 순위 발표</h1>
        <button class="btn-refresh" onclick="loadData()">🔄 데이터 업데이트</button>
        <canvas id="rankingChart"></canvas>
    </div>

    <script>
        // ★ 선생님의 구글 시트 CSV 주소 (동일하게 사용)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1U6YtLPRPv2vI8hyceTnt2mL7bqCHRXMLx1RlZD12gTc/export?format=csv";

        let myChart;

        async function loadData() {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // 첫 줄 제외
            
            let teamData = { "1모둠": 0, "2모둠": 0, "3모둠": 0, "4모둠": 0, "5모둠": 0, "6모둠": 0 };
            
            // 데이터 정리 (가장 최근 응답 기준)
            let latestEntries = {};
            rows.forEach(row => {
                const cols = row.split(',');
                if(cols.length < 4) return;
                const teamName = cols[1].trim();
                const details = JSON.parse(cols[3].replace(/"{2}/g, '"').slice(1, -1)); // JSON 파싱
                latestEntries[teamName] = details;
            });

            // 임의의 수익률 생성 (라운드마다 변하게 하고 싶으면 여기서 조절)
            const rates = { "1모둠": 1.1, "2모둠": 0.9, "3모둠": 1.3, "4모둠": 0.8, "5모둠": 1.2, "6모둠": 1.0 };

            let finalBalances = { "1모둠": 0, "2모둠": 0, "3모둠": 0, "4모둠": 0, "5모둠": 0, "6모둠": 0 };
            
            Object.keys(latestEntries).forEach(investor => {
                let total = 0;
                Object.entries(latestEntries[investor]).forEach(([target, amount]) => {
                    total += amount * (rates[target] || 1);
                });
                finalBalances[investor] = total;
            });

            updateChart(finalBalances);
        }

        function updateChart(balances) {
            const ctx = document.getElementById('rankingChart').getContext('2d');
            const sortedLabels = Object.keys(balances).sort((a, b) => balances[b] - balances[a]);
            const sortedValues = sortedLabels.map(l => balances[l]);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedLabels,
                    datasets: [{
                        label: '최종 자산 (원)',
                        data: sortedValues,
                        backgroundColor: ['#f1c40f', '#bdc3c7', '#e67e22', '#3498db', '#9b59b6', '#2ecc71'],
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, ticks: { color: 'white' } },
                        x: { ticks: { color: 'white', font: { size: 16, weight: 'bold' } } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
