<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 모둠 투자 시스템</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #1877f2; line-height: 1.5; }
        .input-group { margin-bottom: 15px; padding: 10px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .preview { font-size: 0.85em; color: #666; margin-top: 5px; display: block; height: 1.2em; }
        #status { font-weight: bold; margin: 20px 0; padding: 10px; border-radius: 8px; text-align: center; }
        button { width: 100%; padding: 18px; background: #1877f2; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <div id="roundInfo" class="info">데이터 로딩 중...</div>
        
        <label>📍 우리 모둠 선택</label>
        <select id="myTeam" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:2px solid #ddd;" onchange="renderFields()">
            <option value="">-- 선택하세요 --</option>
            <option value="1">1모둠</option><option value="2">2모둠</option><option value="3">3모둠</option>
            <option value="4">4모둠</option><option value="5">5모둠</option><option value="6">6모둠</option>
        </select>
        
        <div id="fields"></div>
        
        <div id="status">상단 설정을 확인해주세요.</div>
        <button id="submitBtn" onclick="submit()" disabled>제출하기</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ROUND = urlParams.get('round') || "1";
        const LIMIT = parseInt(urlParams.get('limit')) || 100000000;
        
        // ★ 선생님의 GAS URL을 아래 큰따옴표 안에 꼭 넣어주세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw9ilfJESVVBOOeruR2b19aieXLt9lDTfFcpPMO6MGIT_8nWamfUtiKWh80TRbGYk1I/exec";

        document.getElementById('roundInfo').innerText = `📅 ${ROUND}라운드\n💰 투자 한도: ${LIMIT.toLocaleString()}원`;

        // 한글 금액 변환 함수
        function parseKorean(text) {
    if (!text) return 0;
    
    // 쉼표와 '원' 글자 제거
    let clean = text.replace(/,/g, '').replace(/원/g, '').trim();
    
    // 순수 숫자만 있는 경우 바로 반환
    if (!isNaN(clean) && clean !== "") return Number(clean);

    let total = 0;
    let s = clean;

    // 1. '억' 단위 처리
    if (s.includes('억')) {
        let parts = s.split('억');
        total += (parseFloat(parts[0]) || 0) * 100000000;
        s = parts[1] || "";
    }

    // 2. '천만' 단위가 한꺼번에 올 경우를 대비한 특수 처리
    if (s.includes('천만')) {
        let parts = s.split('천만');
        total += (parseFloat(parts[0]) || 0) * 10000000;
        s = parts[1] || "";
    }
    // 3. '만' 단위 처리
    else if (s.includes('만')) {
        let parts = s.split('만');
        total += (parseFloat(parts[0]) || 0) * 10000;
        s = parts[1] || "";
    }

    // 4. '천' 단위 처리
    if (s.includes('천')) {
        let parts = s.split('천');
        total += (parseFloat(parts[0]) || 0) * 1000;
        s = parts[1] || "";
    }

    // 5. 남은 숫자가 있다면 더하기
    if (s && !isNaN(s)) {
        total += Number(s);
    }

    return total;
}

        function renderFields() {
            const myTeam = document.getElementById('myTeam').value;
            const container = document.getElementById('fields');
            container.innerHTML = '';
            if(!myTeam) return;

            for(let i=1; i<=6; i++) {
                if(i == myTeam) continue;
                container.innerHTML += `
                    <div class="input-group">
                        <label>📈 ${i}모둠 투자액</label>
                        <input type="text" class="bet" data-team="${i}" oninput="calc()" placeholder="예: 2천, 500만, 15000000">
                        <span class="preview" id="prev-${i}"></span>
                    </div>`;
            }
            calc();
        }

        function calc() {
            let total = 0;
            document.querySelectorAll('.bet').forEach(input => {
                const val = parseKorean(input.value);
                total += val;
                document.getElementById(`prev-${input.dataset.team}`).innerText = val > 0 ? `👉 ${val.toLocaleString()}원` : "";
            });

            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            if(total === LIMIT) {
                status.innerText = "✅ 금액이 정확합니다! 제출 가능.";
                status.style.background = "#e7fdf0"; status.style.color = "#1e7e34";
                btn.disabled = false;
            } else {
                const diff = LIMIT - total;
                status.innerText = diff > 0 ? `⚠️ ${(diff).toLocaleString()}원 더 투자해야 합니다.` : `❌ ${(Math.abs(diff)).toLocaleString()}원 초과했습니다!`;
                status.style.background = "#fff3e0"; status.style.color = "#e65100";
                btn.disabled = true;
            }
        }

        async function submit() {
            const myTeam = document.getElementById('myTeam').value;
    if(!myTeam) { alert("모둠을 먼저 선택하세요!"); return; }

    const details = {};
    let totalCheck = 0;
    document.querySelectorAll('.bet').forEach(input => {
        const val = parseKorean(input.value);
        details[input.dataset.team + "모둠"] = val;
        totalCheck += val;
    });
    
    // 데이터를 보낼 준비 (시트의 열 순서에 맞춤)
    const payload = { 
        round: ROUND, 
        team: myTeam + "모둠", 
        total: totalCheck, 
        details: details 
    };
    
    const btn = document.getElementById('submitBtn');
    btn.innerText = "🚀 전송 중..."; 
    btn.disabled = true;

    // 데이터를 구글 시트로 보내는 실제 명령
    try {
        await fetch(GAS_URL, {
            method: "POST",
            mode: 'no-cors', // 중요: 보안 에러 방지
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        });
        
        alert("성공적으로 제출되었습니다! 🌸");
        location.reload(); // 제출 후 화면 새로고침
    } catch(e) {
        alert("전송 중 오류가 발생했습니다. 주소를 확인해주세요.");
        btn.innerText = "제출하기";
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
